name: REPI Independent Harness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repi-harness:
    name: repi independent product gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: REPI product boundary gate
        run: npm run gate:repi-product

      - name: REPI profile isolation gate
        run: npm run gate:repi-isolation

      - name: REPI product surface gate
        run: npm run gate:repi-product-surface

      - name: REPI closure readiness gate
        run: npm run gate:autonomous-closure-readiness -- --no-write

      - name: REPI capability release bundle gate
        run: npm run gate:capability-release-bundle -- --no-write

      - name: REPI release CI pipeline gate
        run: npm run gate:release-ci-pipeline -- --no-write

      - name: REPI release evidence index gate
        run: npm run gate:release-evidence-index -- --no-write

      - name: REPI runtime adapter execution gate
        run: npm run gate:runtime-adapter-execution

      - name: Top-level REPI independence harness
        run: npm run gate:repi-harness

      - name: Full repository check
        run: npm run check

      - name: No generated diff
        run: |
          git diff --check
          git diff --exit-code
