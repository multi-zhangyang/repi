version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # npm upgrades are applied manually because this repo has a generated
    # package shrinkwrap and release harness gates that Dependabot cannot
    # regenerate on its own. Security alerts still remain visible in GitHub.
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
