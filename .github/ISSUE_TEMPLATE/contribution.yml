name: Contribution Proposal
description: Propose a REPI change or feature
labels: []
body:
  - type: markdown
    attributes:
      value: |
        请先阅读仓库里的 CONTRIBUTING.md 和 README.md。描述尽量短、可复现、可验证。

  - type: textarea
    id: what
    attributes:
      label: What do you want to change?
      description: Be specific and concise.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why?
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: how
    attributes:
      label: How? (optional)
      description: Brief technical approach if you have one in mind.
    validations:
      required: false
