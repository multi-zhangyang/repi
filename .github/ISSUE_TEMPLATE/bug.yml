name: Bug Report
description: Report something broken in REPI
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请写清楚 `repi --version`、安装方式、操作系统、复现命令和关键报错。不要提交 API key 或 token。

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Be specific. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: e.g. 0.78.1
    validations:
      required: false
