name: REPI Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build, verify, release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Hermetic REPI runtime dir (same approach as repi-ci.yml) so doctor/smoke
      # don't depend on a pre-provisioned ~/.repi/agent.
      REPI_CODING_AGENT_DIR: ${{ github.workspace }}/.repi-agent-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build all packages
        run: npm run build

      # `npm run build` regenerates packages/ai/src/{models,image-models}.generated.ts
      # from a live network fetch, which drifts vs the committed snapshot. We do
      # not commit regenerated model files, so restore them to the committed
      # state so the working tree stays clean for the no-diff gate. The built
      # dist/ (and thus the release tarball) already contains the fresh list.
      - name: Restore generated model snapshots
        run: |
          git checkout -- packages/ai/src/models.generated.ts packages/ai/src/image-models.generated.ts

      - name: Repository check
        run: npm run check

      - name: Provision REPI runtime
        run: node scripts/reverse-agent/init-repi-profile.mjs .

      - name: REPI offline smoke
        run: node scripts/reverse-agent/repi-smoke.mjs . --json

      # This is the release-critical gate: it packs the four local npm
      # artifacts, installs them into a fresh throwaway project, and validates
      # the user-facing entrypoints that must work after a GitHub Release:
      # `repi` on PATH, `/goal` in print/json/RPC, fresh env-only models, stale
      # saved-provider override, and `repi doctor` diagnostics.
      - name: REPI release tarball install smoke
        run: npm run smoke:release -- . --skip-build --json

      - name: No generated diff
        run: |
          git diff --check
          git diff --exit-code

      # Pack the four workspace packages into tarballs and attach them to the
      # release. Users who want a local npm install can download a tarball and
      # run `npm i -g ./<pkg>-<ver>.tgz`; everyone else uses install.sh.
      # No npm publish, no NPM_TOKEN, no external account required.
      - name: Pack release tarballs
        run: |
          mkdir -p release-assets
          for d in packages/ai packages/agent packages/tui packages/coding-agent; do
            (cd "$d" && npm pack --ignore-scripts)
            cp "$d"/*.tgz release-assets/
          done
          ls -la release-assets/

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/*.tgz
