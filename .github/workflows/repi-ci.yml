name: REPI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: check and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Hermetic REPI runtime dir so doctor/smoke don't depend on the
      # runner's ~/.repi/agent being pre-provisioned. init-repi-profile
      # writes settings.json (scoped memory defaults) here; smoke/doctor
      # read the same env var.
      REPI_CODING_AGENT_DIR: ${{ github.workspace }}/.repi-agent-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Repository check
        run: npm run check

      - name: Provision REPI runtime
        run: node scripts/reverse-agent/init-repi-profile.mjs .

      - name: REPI offline smoke
        run: node scripts/reverse-agent/repi-smoke.mjs . --json

      - name: REPI install path smoke
        run: npm run smoke:install-path -- --json

      - name: REPI extension compatibility smoke
        run: npm run smoke:extensions -- --json

      - name: No generated diff
        run: |
          git diff --check
          git diff --exit-code
